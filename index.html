<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <title>Sabari Nath</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <style>
    html {
      scroll-behavior: smooth;
    }
  </style>


  <header>
    <div class="logo">SABARINATH G</div>

    <nav id="nav">
      <a href="#">Home</a>
      <a href="#gallery">Gallery</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </nav>

    <div class="menu-btn" onclick="toggleMenu()">☰</div>
  </header>
  <!-- HERO -->
  <section class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1>CAPTURING<br>MOMENTS<br>THAT MATTER</h1>
      <p>Through light, emotion, and perspective</p>
      <button>Explore Work</button>
    </div>
  </section>

  <!-- GALLERY -->
  <section id="gallery">
    <div class="section-head">
      <h2>Gallery</h2>
    </div>

    <div class="gallery-grid">
      <img src="./bg3.jpg" loading="lazy" onclick="openLightbox(0)">
      <img src="./bg3.jpg" loading="lazy" onclick="openLightbox(0)">
      <img src="./bg3.jpg" loading="lazy" onclick="openLightbox(0)">
      <img src="./bg3.jpg" loading="lazy" onclick="openLightbox(0)">
      <img src="./bg3.jpg" loading="lazy" onclick="openLightbox(0)">
      <img src="./bg3.jpg" loading="lazy" onclick="openLightbox(0)">
    </div>
  </section>

  <!-- ABOUT -->
  <section id="about">
    <div class="about-text">
      <h2>About Me</h2>
      <p>
        I create cinematic photography focused on emotion,
        storytelling, and timeless visual aesthetics.
      </p>
    </div>
    <div class="about-img">
      <img src="./me1.jpg">
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact">
    <h2>Contact</h2>
    <a href="mailto:sabarinath8075@gmail.com">Gmail</a>
  </section>
  <script src="script.js"></script>
  <div id="lightbox">
    <span class="close" onclick="closeLightbox()">×</span>
    <span class="prev" onclick="changeSlide(-1)">❮</span>
    <img id="lightbox-img">
    <span class="next" onclick="changeSlide(1)">❯</span>
  </div>
</body>

</html>
